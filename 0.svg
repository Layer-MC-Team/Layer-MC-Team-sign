<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  
  <!-- ========================================================== -->
  <!-- 配置参数：                                                   -->
  <!-- - 总视口大小：200 x 200 px                                   -->
  <!-- - 外边缘留白：15 px                                         -->
  <!-- - 单个方块尺寸：50 x 50 px                                  -->
  <!-- - 方块间缝隙：10 px                                         -->
  <!-- - 四边直角：完全无圆角                                      -->
  <!-- ========================================================== -->

  <!-- ========================================================== -->
  <!-- 颜色矩阵 (3x3 十字对称布局)                                 -->
  <!--                                                             -->
  <!--    [ 蓝 ]   [ 白 ]   [ 蓝 ]                                 -->
  <!--    [ 红 ]   [ 黑 ]   [ 红 ]                                 -->
  <!--    [ 蓝 ]   [ 白 ]   [ 蓝 ]                                 -->
  <!--                                                             -->
  <!-- 配色代码：                                                  -->
  <!--  蓝 = #3B82F6  (四个角)                                     -->
  <!--  白 = #FFFFFF  (上下中心)                                   -->
  <!--  红 = #EF4444  (左右中心)                                   -->
  <!--  黑 = #111111  (绝对中心)                                   -->
  <!-- ========================================================== -->

  <!-- 纯黑背景 -->
  <rect x="0" y="0" width="200" height="200" fill="#050505" />

  <!-- 第一行：蓝、白、蓝 -->
  <rect x="15" y="15" width="50" height="50" fill="#3B82F6" />
  <rect x="75" y="15" width="50" height="50" fill="#FFFFFF" />
  <rect x="135" y="15" width="50" height="50" fill="#3B82F6" />
  
  <!-- 第二行：红、黑、红 -->
  <rect x="15" y="75" width="50" height="50" fill="#EF4444" />
  <rect x="75" y="75" width="50" height="50" fill="#111111" />
  <rect x="135" y="75" width="50" height="50" fill="#EF4444" />
  
  <!-- 第三行：蓝、白、蓝 -->
  <rect x="15" y="135" width="50" height="50" fill="#3B82F6" />
  <rect x="75" y="135" width="50" height="50" fill="#FFFFFF" />
  <rect x="135" y="135" width="50" height="50" fill="#3B82F6" />
</svg>  